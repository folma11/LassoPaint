<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lasso Paint</title>
  <style>
    :root {
      color-scheme: dark;

      --color-bg: #323232;
      --color-surface: #3b3b3b;
      --color-surface-hover: #454545;
      --color-surface-pressed: #292929;
      --color-border: #505050;
      --color-separator: #464646;
      --color-text: #e0e0e0;
      --color-text-heading: #ffffff;
      --color-text-muted: #ababab;
      --color-text-status: #c2c2c2;
      --color-accent: #1473e6;
      --color-accent-hover: #2680eb;
      --color-accent-pressed: #0d66d0;
      --color-focus: #5aa9fa;
      --color-success: #8fbc8f;
      --color-warning: #d2aa68;
      --color-error: #d98787;
      --color-disabled: #777777;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --control-radius: 3px;
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: Consolas, "SFMono-Regular", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-width: 250px;
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.4;
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    .panel {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .panel h1 {
      margin: 0;
      color: var(--color-text-heading);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      text-align: center;
    }

    .brand-logo {
      width: 36px;
      max-width: 160px;
      height: auto;
      display: block;
      margin: 0 auto 4px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-tagline {
      margin-top: 2px;
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .brand + .primary,
    .brand + .primary-split {
      margin-top: var(--space-2);
    }

    .panel h2 {
      margin: 0;
      color: var(--color-text);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel p {
      margin: 0;
      line-height: 1.4;
      color: var(--color-text-muted);
    }

    .panel button {
      min-height: 30px;
      max-width: 100%;
      padding: 6px var(--space-3);
      cursor: pointer;
      border: 1px solid var(--color-border);
      border-radius: var(--control-radius);
      background: var(--color-surface);
      color: var(--color-text);
      font: inherit;
      font-weight: 500;
      line-height: 1.3;
      white-space: normal;
    }

    .panel button:hover:not(:disabled) {
      background: var(--color-surface-hover);
    }

    .panel button:active:not(:disabled) {
      background: var(--color-surface-pressed);
    }

    .panel button:focus-visible,
    .section-title:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 1px;
    }

    .panel button:disabled {
      cursor: default;
      color: var(--color-disabled);
      border-color: var(--color-separator);
      background: var(--color-bg);
    }

    .panel button.primary {
      width: 100%;
      height: 48px;
      min-height: 48px;
      padding: var(--space-2) var(--space-4);
      font-size: 14px;
      font-weight: 600;
      background: var(--color-accent);
      color: var(--color-text-heading);
      border-color: var(--color-accent);
      margin: var(--space-1) 0;
    }

    .panel button.primary:hover:not(:disabled) {
      background: var(--color-accent-hover);
      border-color: var(--color-accent-hover);
    }

    .panel button.primary:active:not(:disabled) {
      background: var(--color-accent-pressed);
      border-color: var(--color-accent-pressed);
    }

    .panel button.compact {
      padding: 5px var(--space-2);
      font-size: 12px;
    }

    .primary-split {
      width: 100%;
      min-height: 38px;
      display: flex;
      flex-direction: row;
      gap: var(--space-1);
      margin: var(--space-1) 0;
      overflow: hidden;
    }

    .primary-split > button {
      flex: 1 1 33%;
      min-width: 0;
    }

    .primary-split > .mode-btn {
      flex: 1 1 33%;
      min-width: 0;
    }

    .mode-btn {
      width: 42px;
      height: 38px;
      min-height: 38px;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: var(--control-radius);
      background: var(--color-surface);
      color: var(--color-text);
      user-select: none;
    }

    .mode-btn:hover {
      background: var(--color-surface-hover);
    }

    .mode-btn:active {
      background: var(--color-surface-pressed);
    }

    .mode-btn:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 1px;
    }

    .mode-btn[aria-pressed="true"] {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: var(--color-text-heading);
    }

    .mode-icon-wrap {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .mode-icon {
      width: 20px;
      height: 20px;
      display: block;
      object-fit: contain;
      background: transparent;
      pointer-events: none;
    }

    .status {
      min-height: 1.2em;
      margin-top: var(--space-1);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-separator);
      color: var(--color-text-status);
      font-size: 12px;
    }

    .status.error {
      color: var(--color-error);
    }

    .section {
      border-top: 1px solid var(--color-separator);
      padding-top: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      cursor: pointer;
      min-height: 24px;
      padding: var(--space-1) 0;
      user-select: none;
    }

    .section-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .section-content.is-collapsed {
      display: none;
    }

    .section-note {
      font-size: 12px;
      line-height: 1.4;
      padding: var(--space-1) 0 0 24px;
    }

    .section-muted {
      color: var(--color-text-muted);
      font-size: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .button-row > button {
      flex: 1 1 120px;
    }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: 0;
      background: transparent;
      margin-top: var(--space-1);
    }

    .settings-row h2 {
      margin-bottom: var(--space-1);
    }

    .opacity-control {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      margin: var(--space-1) 0 var(--space-3);
    }

    .opacity-options {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 0;
      margin: 0;
      padding: 0;
    }

    .opacity-option {
      box-sizing: border-box;
      flex: 1 1 0;
      width: auto;
      height: 30px;
      min-width: 42px;
      min-height: 30px;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--color-separator);
      border-radius: var(--control-radius);
      background: var(--color-surface-pressed);
      color: var(--color-text-muted);
      -webkit-text-fill-color: var(--color-text-muted);
      font-size: 11px;
      font-weight: 600;
      user-select: none;
      line-height: 1;
    }

    .opacity-option + .opacity-option {
      margin-left: -1px;
    }

    .opacity-option:first-child {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .opacity-option:not(:first-child):not(:last-child) {
      border-radius: 0;
    }

    .opacity-option:last-child {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .opacity-option:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
      -webkit-text-fill-color: var(--color-text);
    }

    .opacity-option:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 1px;
    }

    .opacity-option[aria-pressed="true"] {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: var(--color-text-heading);
      -webkit-text-fill-color: var(--color-text-heading);
    }

    .workflow-option {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 20px;
      padding: 2px 0;
      color: var(--color-text) !important;
      -webkit-text-fill-color: var(--color-text);
      line-height: 1.4;
      cursor: pointer;
      visibility: visible;
      opacity: 1;
    }

    .workflow-option span {
      display: block;
      min-width: 0;
      color: var(--color-text) !important;
      -webkit-text-fill-color: var(--color-text);
      font-weight: 400;
      opacity: 1;
    }

    .workflow-option input[type="checkbox"] {
      appearance: auto;
      -webkit-appearance: checkbox;
      flex: 0 0 16px;
      width: 16px;
      height: 16px;
      margin: 0;
      opacity: 1;
      accent-color: var(--color-accent);
      color-scheme: dark;
      cursor: pointer;
    }

    .workflow-option input[type="checkbox"]:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 1px;
    }

    .log-area {
      height: 140px;
      overflow: auto;
      border: 1px solid var(--color-border);
      border-radius: var(--control-radius);
      background: var(--color-surface-pressed);
      color: var(--color-text);
      padding: var(--space-2);
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .experimental-toggle {
      font-size: 12px;
      color: var(--color-text-muted);
      padding: var(--space-1) 0;
    }

    @media (max-width: 300px) {
      .panel {
        padding: var(--space-3);
      }

      .button-row > button {
        flex-basis: 100%;
      }
    }

  </style>
</head>
<body>
  <div class="panel">
    <header class="brand">
      <img class="brand-logo" src="assets/logo/logo.png" alt="Lasso Paint logo">
      <div class="brand-copy">
        <h1>Lasso Paint</h1>
        <div class="brand-tagline">Fill selections faster. Stay in the flow.</div>
      </div>
    </header>

    <div class="primary-split" role="group" aria-label="Auto Mode">
      <div id="autoFillModeButton" class="mode-btn" role="button" tabindex="0" aria-label="Fill mode" title="Fill mode" aria-pressed="false">
        <span class="mode-icon-wrap" aria-hidden="true">
          <img class="mode-icon" src="assets/icons/mode-fill.png" alt="">
        </span>
      </div>
      <div id="autoEraseModeButton" class="mode-btn" role="button" tabindex="0" aria-label="Erase mode" title="Erase mode" aria-pressed="false">
        <span class="mode-icon-wrap" aria-hidden="true">
          <img class="mode-icon" src="assets/icons/mode-erase.png" alt="">
        </span>
      </div>
      <div id="autoOffModeButton" class="mode-btn" role="button" tabindex="0" aria-label="Auto mode off" title="Auto mode off" aria-pressed="true">
        <span class="mode-icon-wrap" aria-hidden="true">
          <img class="mode-icon" src="assets/icons/mode-off.png" alt="">
        </span>
      </div>
    </div>

    <div class="opacity-control" aria-label="Fill opacity">
      <div class="opacity-options" role="group" aria-label="Fill opacity">
        <button class="opacity-option" type="button" data-opacity="20" aria-label="Fill opacity 20%" aria-pressed="false">20</button>
        <button class="opacity-option" type="button" data-opacity="40" aria-label="Fill opacity 40%" aria-pressed="false">40</button>
        <button class="opacity-option" type="button" data-opacity="60" aria-label="Fill opacity 60%" aria-pressed="false">60</button>
        <button class="opacity-option" type="button" data-opacity="80" aria-label="Fill opacity 80%" aria-pressed="false">80</button>
        <button class="opacity-option" type="button" data-opacity="100" aria-label="Fill opacity 100%" aria-pressed="true">100</button>
      </div>
    </div>

    <div class="section">
      <div class="settings-row">
        <h2>Workflow</h2>
        <label class="workflow-option" for="newLayerCheckbox"><input id="newLayerCheckbox" type="checkbox"><span>New Layer before fill</span></label>
        <label class="workflow-option" for="deselectCheckbox"><input id="deselectCheckbox" type="checkbox"><span>Deselect after action</span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="advancedToggle" role="button" tabindex="0" aria-expanded="false" aria-controls="advancedContent">
        <h2>Advanced</h2>
        <span class="section-muted">▸</span>
      </div>
      <div class="section-content is-collapsed" id="advancedContent">
        <div class="button-row">
          <button id="runFillButton" type="button">Run Fill</button>
          <button id="eraseSelectionButton" type="button">Erase Selection</button>
        </div>
        <div class="button-row">
          <button id="quickFillButton" class="compact" type="button" data-command="fill">Fill</button>
          <button id="quickFillDeselectButton" class="compact" type="button" data-command="fillDeselect">Fill+Deselect</button>
          <button id="quickNewLayerFillButton" class="compact" type="button" data-command="newLayerFill">NewLayer+Fill</button>
          <button id="quickNewLayerFillDeselectButton" class="compact" type="button" data-command="newLayerFillDeselect">NewLayer+Fill+Deselect</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="developerToggle" role="button" tabindex="0" aria-expanded="false" aria-controls="developerContent">
        <h2>Developer</h2>
        <span class="section-muted">▸</span>
      </div>
      <div class="section-content is-collapsed" id="developerContent">
        <div class="experimental-toggle">Event diagnostics and selection watcher are kept disabled for safety.</div>
        <div class="button-row">
          <button id="startEventLogButton" type="button">Start Event Log</button>
          <button id="stopEventLogButton" type="button">Stop Event Log</button>
          <button id="clearEventLogButton" type="button">Clear Log</button>
        </div>
        <div id="eventLog" class="log-area" aria-live="polite"></div>
        <div class="button-row">
          <button id="startWatchButton" type="button" disabled>Start Watch</button>
          <button id="stopWatchButton" type="button" disabled>Stop Watch</button>
          <button id="clearWatchLogButton" type="button" disabled>Clear Watch Log</button>
        </div>
        <div id="watchLog" class="log-area" aria-live="polite"></div>
      </div>
    </div>

    <div id="statusText" class="status" role="status" aria-live="polite">Ready.</div>
  </div>

  <script src="storage/settings.js"></script>
  <script src="photoshop/batchplay.js"></script>
  <script src="photoshop/modal.js"></script>
  <script src="commands/fill.js"></script>
  <script src="commands/erase.js"></script>
  <script src="commands/deselect.js"></script>
  <script src="commands/layer.js"></script>
  <script src="photoshop/bridge.js"></script>
  <script src="ui/panel.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
